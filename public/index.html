<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Sweepstake</title>
<style>
  :root {
    --gold: #E8B73A;
    --green-deep: #0A2818;
    --cream: #F4EAD0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #14422a 0%, var(--green-deep) 55%, #061a10 100%);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--cream);
    padding: 20px 12px 40px;
  }
  .frame { max-width: 560px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 22px; }
  .eyebrow { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 8px; }
  h1 { font-size: 44px; margin: 0; font-weight: 900; letter-spacing: -.02em; font-style: italic; text-shadow: 0 2px 20px rgba(232,183,58,.25); }
  .sub { font-size: 13px; color: rgba(244,234,208,.7); margin-top: 8px; }
  .controls { display: flex; gap: 8px; margin-bottom: 14px; }
  button {
    padding: 12px 18px; border-radius: 10px; border: none;
    background: var(--gold); color: var(--green-deep);
    font-weight: 800; font-size: 14px; cursor: pointer; flex: 1;
  }
  button:focus-visible { outline: 2px solid var(--cream); outline-offset: 2px; }
  button:disabled { opacity: .6; cursor: default; }
  button.secondary { background: transparent; color: var(--gold); border: 1px solid rgba(232,183,58,.5); font-weight: 700; }
  button.secondary:hover { background: rgba(232,183,58,.1); }
  .msg { font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 12px; line-height: 1.5; }
  .error { background: rgba(180,40,40,.2); border: 1px solid rgba(220,80,80,.5); color: #ffd0d0; }
  .hint { background: rgba(255,255,255,.04); color: rgba(244,234,208,.7); }
  .warn { background: rgba(232,183,58,.12); border: 1px solid rgba(232,183,58,.45); color: var(--gold); }
  .updated { font-size: 11px; color: rgba(244,234,208,.5); text-align: right; margin-bottom: 10px; }
  /* ── Sweepstake Gazette ── */
  .gazette { background: #F4EAD0; color: #1a1a1a; border-radius: 10px; padding: 14px 16px 16px; margin-bottom: 14px; box-shadow: 0 4px 18px rgba(0,0,0,.35); border: 2px solid #b89b3a; }
  .gz-masthead { text-align: center; border-bottom: 3px double #1a1a1a; padding-bottom: 6px; margin-bottom: 10px; }
  .gz-title { font-family: 'Georgia','Times New Roman',serif; font-weight: 900; font-size: 26px; letter-spacing: .02em; line-height: 1; }
  .gz-sub { font-family: 'Georgia',serif; font-size: 10px; letter-spacing: .28em; text-transform: uppercase; margin-top: 4px; color: #555; }
  .gz-headline { font-family: 'Georgia','Times New Roman',serif; font-size: 15px; line-height: 1.4; padding: 7px 0; border-bottom: 1px solid rgba(0,0,0,.12); }
  .gz-headline:last-child { border-bottom: none; }
  .gz-headline b { font-weight: 900; }
  .gz-lede { font-style: italic; color: #444; font-size: 13px; }
  ol { list-style: none; padding: 0; margin: 0; }
  li { margin-bottom: 8px; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); }
  li.podium { background: linear-gradient(100deg, rgba(232,183,58,.18), rgba(255,255,255,.04)); border-color: rgba(232,183,58,.5); }
  .rowhead { width: 100%; display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: none; border: none; color: var(--cream); cursor: pointer; text-align: left; flex: unset; border-radius: 0; }
  .rank { width: 26px; text-align: center; font-weight: 900; font-size: 17px; color: rgba(244,234,208,.55); flex-shrink: 0; }
  .rank.top { color: var(--gold); }
  .name { font-weight: 700; font-size: 15px; min-width: 78px; flex-shrink: 0; }
  .flags { flex: 1; font-size: 15px; letter-spacing: 1px; overflow: hidden; }
  .total { font-weight: 900; font-size: 19px; color: var(--gold); min-width: 36px; text-align: right; }
  .gd { font-size: 11px; color: rgba(244,234,208,.5); min-width: 30px; text-align: right; }
  .chev { color: rgba(244,234,208,.4); font-size: 12px; width: 14px; }
  .breakdown { padding: 4px 14px 12px 50px; border-top: 1px solid rgba(255,255,255,.06); }
  .brow { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; color: rgba(244,234,208,.8); }
  .bteam { flex: 1; }
  .bdetail { font-size: 11px; color: rgba(244,234,208,.5); }
  .bpts { font-weight: 800; color: var(--gold); min-width: 28px; text-align: right; }
  footer { margin-top: 18px; text-align: center; font-size: 11px; color: rgba(244,234,208,.45); line-height: 1.6; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="eyebrow">FIFA World Cup 2026 · World Cup Sweepstake</div>
    <h1>The Standings</h1>
    <div class="sub">€440 pot · 22 entries · 1st €250 / 2nd €120 / 3rd €50</div>
  </header>

  <div class="controls">
    <button id="refresh">Update scores</button>
  </div>
  <div class="controls">
    <button id="gazetteToggle" class="secondary">📰 Today's Top Stories</button>
  </div>

  <div id="gazette" style="display:none;"></div>

  <div id="messages"></div>
  <div id="updated" class="updated"></div>
  <ol id="board"></ol>

  <footer>
    Win 3 · Draw 1 · Goal 1 · KO bonuses cumulative (3/5/10/15/20/30) · shootout = draw
  </footer>
</div>

<script>
// ── COMPETITION DATA ────────────────────────────────────────
const ENTRIES = [
  { n:1, name:"Amy", teams:["France","Switzerland","Scotland","Saudi Arabia"] },
  { n:2, name:"Caroline", teams:["Belgium","Croatia","Ghana","New Zealand"] },
  { n:3, name:"Conor", teams:["Brazil","Senegal","Australia","Panama"] },
  { n:4, name:"Dave Mac", teams:["Spain","Uruguay","Scotland","Jordan"] },
  { n:5, name:"Davy", teams:["Germany","Turkey","Egypt","Haiti"] },
  { n:6, name:"Eoghan", teams:["Spain","USA","Czechia","South Africa"] },
  { n:7, name:"Greg", teams:["Argentina","Sweden","Bosnia","South Africa"] },
  { n:8, name:"Helen", teams:["Spain","Mexico","Tunisia","Uzbekistan"] },
  { n:9, name:"Isabel", teams:["Brazil","Croatia","Ghana","South Africa"] },
  { n:10, name:"Jack", teams:["France","Japan","Bosnia","New Zealand"] },
  { n:11, name:"Juliette", teams:["Brazil","Japan","Scotland","South Africa"] },
  { n:12, name:"Leanne", teams:["Portugal","Sweden","Bosnia","Qatar"] },
  { n:13, name:"Louie", teams:["Spain","Japan","South Korea","Uzbekistan"] },
  { n:14, name:"Maurice", teams:["Belgium","USA","Egypt","South Africa"] },
  { n:15, name:"Mike", teams:["France","Mexico","Scotland","Iran"] },
  { n:16, name:"Osian", teams:["Netherlands","USA","Scotland","South Africa"] },
  { n:17, name:"Paul", teams:["Spain","Uruguay","Paraguay","Uzbekistan"] },
  { n:18, name:"Richie", teams:["Spain","USA","Ivory Coast","Uzbekistan"] },
  { n:19, name:"Rob", teams:["Brazil","Uruguay","South Korea","DR Congo"] },
  { n:20, name:"Rory", teams:["France","USA","Ghana","New Zealand"] },
  { n:21, name:"Zeyneb", teams:["France","USA","Scotland","DR Congo"] },
  { n:22, name:"Katie", teams:["France","Croatia","Australia","DR Congo"] },
];

const FLAGS = {
  France:"🇫🇷",Switzerland:"🇨🇭",Scotland:"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Saudi Arabia":"🇸🇦",Belgium:"🇧🇪",
  Croatia:"🇭🇷",Ghana:"🇬🇭","New Zealand":"🇳🇿",Brazil:"🇧🇷",Senegal:"🇸🇳",Australia:"🇦🇺",
  Panama:"🇵🇦",Spain:"🇪🇸",Uruguay:"🇺🇾",Jordan:"🇯🇴",Germany:"🇩🇪",Turkey:"🇹🇷",Egypt:"🇪🇬",
  Haiti:"🇭🇹",USA:"🇺🇸",Czechia:"🇨🇿","South Africa":"🇿🇦",Argentina:"🇦🇷",Sweden:"🇸🇪",
  Bosnia:"🇧🇦",Mexico:"🇲🇽",Tunisia:"🇹🇳",Uzbekistan:"🇺🇿",Japan:"🇯🇵",Portugal:"🇵🇹",
  Qatar:"🇶🇦","South Korea":"🇰🇷",Netherlands:"🇳🇱",Paraguay:"🇵🇾","Ivory Coast":"🇨🇮",
  Iran:"🇮🇷","DR Congo":"🇨🇩",
};

// Aliases: display name -> possible football-data.org strings.
// Verified risk cases (FIFA uses "Korea Republic" not "South Korea", etc).
// The diagnostic panel will surface anything still unmatched against live data.
const ALIASES = {
  USA: ["United States","USA"],
  "South Korea": ["South Korea","Korea Republic","Republic of Korea"],
  Czechia: ["Czechia","Czech Republic"],
  "Ivory Coast": ["Ivory Coast","Côte d'Ivoire","Cote d'Ivoire"],
  "DR Congo": ["DR Congo","Congo DR","Democratic Republic of the Congo","DR Congo"],
  Turkey: ["Turkey","Türkiye","Turkiye"],
  Bosnia: ["Bosnia","Bosnia and Herzegovina","Bosnia-Herzegovina"],
};

// ── SCORING ─────────────────────────────────────────────────
const BONUS = { group:3, last16:5, qf:10, sf:15, final:20, winner:30 };
const STAGE_ORDER = ["group","last16","qf","sf","final","winner"];
// football-data.org v4 stage strings -> our keys
const STAGE_MAP = {
  GROUP_STAGE:"group", ROUND_OF_16:"last16", QUARTER_FINALS:"qf",
  SEMI_FINALS:"sf", FINAL:"final",
};

function computeTeam(matches, stageReached) {
  let pts = 0, result = 0, goals = 0, bonus = 0, gd = 0;
  for (const m of matches) {
    goals += m.goalsFor;
    gd += m.goalsFor - m.goalsAgainst;
    if (m.knockout && m.decidedByPens) { pts += 1; result += 1; }
    else if (m.goalsFor > m.goalsAgainst) { pts += 3; result += 3; }
    else if (m.goalsFor === m.goalsAgainst) { pts += 1; result += 1; }
    pts += m.goalsFor;
  }
  // Cumulative stage bonuses. IMPORTANT: a team sitting at "group" has only
  // PLAYED group games, not qualified — so it earns NO bonus yet. The group
  // qualification bonus (3) is only banked once the team reaches the last 16
  // or beyond. Because bonuses are cumulative, reaching last16 re-includes
  // that group 3, so we simply skip all bonuses while stage is still "group".
  if (stageReached && stageReached !== "group") {
    const idx = STAGE_ORDER.indexOf(stageReached);
    for (let i = 0; i <= idx; i++) { pts += BONUS[STAGE_ORDER[i]]; bonus += BONUS[STAGE_ORDER[i]]; }
  }
  return { pts, result, goals, bonus, gd };
}

const ALL_TEAMS = [...new Set(ENTRIES.flatMap(e => e.teams))];

function resolveName(apiName) {
  if (!apiName) return null;
  for (const dn of ALL_TEAMS) {
    if (dn === apiName) return dn;
    const al = ALIASES[dn] || [dn];
    if (al.some(a => a.toLowerCase() === apiName.toLowerCase())) return dn;
  }
  return null;
}

function processMatches(apiMatches) {
  const data = {};
  for (const t of ALL_TEAMS) data[t] = { matches: [], stageReached: null };
  const unmatched = new Set();

  for (const m of apiMatches) {
    if (!["FINISHED","IN_PLAY","PAUSED"].includes(m.status)) continue;
    const stageKey = STAGE_MAP[m.stage];
    const ft = m.score?.fullTime || {};
    const hg = ft.home ?? 0, ag = ft.away ?? 0;
    const knockout = m.stage !== "GROUP_STAGE";
    const pens = knockout && m.score?.duration === "PENALTY_SHOOTOUT";

    for (const side of ["home","away"]) {
      const raw = side === "home" ? m.homeTeam?.name : m.awayTeam?.name;
      const dn = resolveName(raw);
      if (!dn) { if (raw) unmatched.add(raw); continue; }
      const gf = side === "home" ? hg : ag;
      const ga = side === "home" ? ag : hg;
      data[dn].matches.push({ goalsFor: gf, goalsAgainst: ga, knockout, decidedByPens: pens });
      if (stageKey) {
        const cur = data[dn].stageReached;
        if (cur === null || STAGE_ORDER.indexOf(stageKey) > STAGE_ORDER.indexOf(cur))
          data[dn].stageReached = stageKey;
      }
    }
  }
  return { data, unmatched: [...unmatched] };
}

function buildLeaderboard(teamData) {
  const rows = ENTRIES.map(e => {
    let total = 0, gd = 0;
    const breakdown = e.teams.map(t => {
      const td = teamData[t];
      if (!td || td.stageReached === null)
        return { team: t, pts: 0, result: 0, goals: 0, bonus: 0, gd: 0 };
      const c = computeTeam(td.matches, td.stageReached);
      total += c.pts; gd += c.gd;
      return { team: t, ...c };
    });
    return { ...e, total, gd, breakdown };
  });
  // Sort: total points, then goal difference, then entry order.
  rows.sort((a,b) => b.total - a.total || b.gd - a.gd || a.n - b.n);
  let rank = 0, prev = null, prevGd = null;
  rows.forEach((r,i) => {
    if (r.total !== prev || r.gd !== prevGd) { rank = i+1; prev = r.total; prevGd = r.gd; }
    r.rank = rank;
  });
  return rows;
}

// ── RENDER ──────────────────────────────────────────────────
let expanded = null;

function render(rows) {
  const board = document.getElementById("board");
  board.innerHTML = "";
  for (const r of rows) {
    const podium = r.rank <= 3 && r.total > 0;
    const li = document.createElement("li");
    if (podium) li.className = "podium";

    const head = document.createElement("button");
    head.className = "rowhead";
    head.onclick = () => { expanded = expanded === r.n ? null : r.n; render(rows); };
    head.innerHTML = `
      <span class="rank ${podium ? "top" : ""}">${r.total > 0 ? r.rank : "–"}</span>
      <span class="name">${r.name}</span>
      <span class="flags">${r.teams.map(t => `<span title="${t}">${FLAGS[t]||"🏳"}</span>`).join(" ")}</span>
      <span class="total">${r.total}</span>
      <span class="gd" title="goal difference (tiebreak)">${r.gd >= 0 ? "+" : ""}${r.gd}</span>
      <span class="chev">${expanded === r.n ? "▾" : "▸"}</span>`;
    li.appendChild(head);

    if (expanded === r.n) {
      const bd = document.createElement("div");
      bd.className = "breakdown";
      bd.innerHTML = r.breakdown.map(b => `
        <div class="brow">
          <span>${FLAGS[b.team]}</span>
          <span class="bteam">${b.team}</span>
          <span class="bdetail">${b.result}r + ${b.goals}g + ${b.bonus}b</span>
          <span class="bpts">${b.pts}</span>
        </div>`).join("");
      li.appendChild(bd);
    }
    board.appendChild(li);
  }
}

function showMessages(html) { document.getElementById("messages").innerHTML = html; }

// ── THE SWEEPSTAKE GAZETTE ──────────────────────────────────
// Generates cheeky newspaper headlines from the live standings.
// Movement is measured against a per-device snapshot in localStorage
// (so "since your last visit", not a global midnight reset).
function renderGazette(rows) {
  // Only run once there are actual points on the board.
  const anyPoints = rows.some(r => r.total > 0);
  const el = document.getElementById("gazette");

  // Load previous snapshot (per device) and compute movement.
  let prev = {};
  try { prev = JSON.parse(localStorage.getItem("wc_prev_ranks") || "{}"); } catch (e) {}
  const movement = {}; // name -> places gained (positive = climbed)
  rows.forEach(r => {
    if (prev[r.name] != null) movement[r.name] = prev[r.name] - r.rank;
  });
  // Save current snapshot for next time.
  const snap = {};
  rows.forEach(r => { snap[r.name] = r.rank; });
  try { localStorage.setItem("wc_prev_ranks", JSON.stringify(snap)); } catch (e) {}

  const leader = rows[0];
  const bottom = rows[rows.length - 1];
  const sortedByMove = Object.entries(movement).sort((a,b) => b[1] - a[1]);
  const biggestClimber = sortedByMove.find(([, m]) => m > 0);
  const biggestFaller = sortedByMove.reverse().find(([, m]) => m < 0);
  const heldTop = movement[leader.name] === 0 || prev[leader.name] === 1;

  // pick a random team from a person for colour
  const aTeam = (r) => r.teams[Math.floor(Math.random() * r.teams.length)];
  const mid = rows[Math.floor(rows.length / 2)];
  const rnd = rows[Math.floor(Math.random() * rows.length)];
  const rnd2 = rows[Math.floor(Math.random() * rows.length)];

  // Headline bank. {x} placeholders filled below. Mix of warm + savage.
  const POOL = [];
  // ── Leader headlines ──
  POOL.push(`<b>${leader.name}</b> sits top of the pile on ${leader.total}. What a champ.`);
  POOL.push(`Bow down: <b>${leader.name}</b> leads the Gazette table. Insufferable about it, no doubt.`);
  POOL.push(`<b>${leader.name}</b> tops the standings on ${leader.total}. The rest of you, do better.`);
  POOL.push(`Sources confirm <b>${leader.name}</b> has already drafted a victory speech. Premature? Probably.`);
  POOL.push(`<b>${leader.name}</b> leads the way, powered by ${aTeam(leader)}. Nobody saw it coming. Nobody.`);
  POOL.push(`Gold standard: <b>${leader.name}</b> out in front and showing no mercy.`);
  if (heldTop) POOL.push(`<b>${leader.name}</b> clings to top spot. The dynasty continues.`);
  if (heldTop) POOL.push(`Still no.1: <b>${leader.name}</b> refuses to relinquish the throne. Boring, frankly.`);
  // ── Second place ──
  if (rows[1]) POOL.push(`<b>${rows[1].name}</b> lurks in second, sharpening the knives. ${leader.name} should sleep lightly.`);
  if (rows[1]) POOL.push(`So near yet so far: <b>${rows[1].name}</b> stuck in the bridesmaid spot on ${rows[1].total}.`);
  // ── Bottom headlines (savage) ──
  POOL.push(`Rock bottom for <b>${bottom.name}</b> on ${bottom.total}. Grim scenes. Thoughts and prayers.`);
  POOL.push(`<b>${bottom.name}</b> props up the table. Somebody has to, but did it have to be like this?`);
  POOL.push(`<b>${bottom.name}</b>'s ${aTeam(bottom)} doing absolutely nothing to ease the pain.`);
  POOL.push(`Wooden spoon watch: <b>${bottom.name}</b> dead last and sinking. Has anyone checked they're okay?`);
  POOL.push(`<b>${bottom.name}</b> on ${bottom.total} points. The Gazette has run out of polite things to say.`);
  POOL.push(`Bottom of the barrel: <b>${bottom.name}</b>. The €420 dream is, mathematically, a nightmare.`);
  POOL.push(`<b>${bottom.name}</b> reportedly "still confident." We admire the delusion.`);
  // ── Movement headlines ──
  if (biggestClimber) POOL.push(`SURGE: <b>${biggestClimber[0]}</b> rockets ${biggestClimber[1]} place${biggestClimber[1]>1?"s":""} up the table since your last visit. Bandwagon forming.`);
  if (biggestClimber) POOL.push(`On the up: <b>${biggestClimber[0]}</b> climbs ${biggestClimber[1]} spot${biggestClimber[1]>1?"s":""}. Form is temporary, smugness is forever.`);
  if (biggestFaller) POOL.push(`FREEFALL: <b>${biggestFaller[0]}</b> tumbles ${Math.abs(biggestFaller[1])} place${Math.abs(biggestFaller[1])>1?"s":""}. The wheels have come off.`);
  if (biggestFaller) POOL.push(`Ouch: <b>${biggestFaller[0]}</b> slides ${Math.abs(biggestFaller[1])} place${Math.abs(biggestFaller[1])>1?"s":""} down the table. It's not panic yet, but it's close.`);
  // ── Mid-table filler (warm) ──
  POOL.push(`<b>${mid.name}</b> sits mid-table on ${mid.total} — neither hero nor villain. A people's champion.`);
  POOL.push(`Quietly fancied: <b>${mid.name}</b>'s ${aTeam(mid)} could yet change everything. Or nothing.`);
  POOL.push(`<b>${mid.name}</b> hovering in the pack, biding their time. Allegedly part of a "master plan."`);
  POOL.push(`Mid-table mediocrity has a name, and this week it's <b>${mid.name}</b>. No offence.`);
  // ── Random punter team callouts ──
  POOL.push(`<b>${rnd.name}</b> pinning hopes on ${aTeam(rnd)}. Bold. Possibly foolish.`);
  POOL.push(`<b>${rnd.name}</b> still waiting on ${aTeam(rnd)} to turn up. Any day now.`);
  POOL.push(`Insiders say <b>${rnd.name}</b> "always backed ${aTeam(rnd)}." Revisionism at its finest.`);
  POOL.push(`<b>${rnd.name}</b> living and dying with every ${aTeam(rnd)} kick. A cautionary tale.`);
  POOL.push(`Breaking: <b>${rnd2.name}</b> has opinions about the table. The Gazette did not ask for them.`);

  // Pick 3 distinct headlines at random.
  const chosen = [];
  const bag = [...POOL];
  while (chosen.length < 3 && bag.length) {
    chosen.push(bag.splice(Math.floor(Math.random() * bag.length), 1)[0]);
  }

  const today = new Date().toLocaleDateString(undefined, { weekday:"long", day:"numeric", month:"long" });

  if (!anyPoints) {
    el.innerHTML = `
      <div class="gz-masthead">
        <div class="gz-title">The Conwon Gazette</div>
        <div class="gz-sub">Late Edition · ${today}</div>
      </div>
      <div class="gz-headline gz-lede">Tournament yet to kick off. Reporters standing by, pens sharpened, knives sharper. Check back once the goals start flowing.</div>`;
    return;
  }

  el.innerHTML = `
    <div class="gz-masthead">
      <div class="gz-title">The Conwon Gazette</div>
      <div class="gz-sub">Late Edition · ${today} · Price: your dignity</div>
    </div>
    ${chosen.map(h => `<div class="gz-headline">${h}</div>`).join("")}`;
}

async function update() {
  const btn = document.getElementById("refresh");
  btn.disabled = true; btn.textContent = "Updating…";
  showMessages("");
  try {
    const res = await fetch("/api/scores");
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `Request failed (${res.status})`);

    const { data, unmatched } = processMatches(json.matches || []);
    const rows = buildLeaderboard(data);
    render(rows);
    renderGazette(rows);

    document.getElementById("updated").textContent =
      "Updated " + new Date().toLocaleTimeString() + " · " + new Date().toLocaleDateString();

    if (unmatched.length) {
      // Silent name-check: logged to the browser console for Rob's setup
      // verification, but not shown to the group. To view, open the page,
      // right-click -> Inspect -> Console.
      console.log("[Name check] Unmatched API team names (scored nothing):", unmatched.join(", "));
    }
  } catch (e) {
    showMessages(`<div class="msg error">${e.message}</div>`);
  } finally {
    btn.disabled = false; btn.textContent = "Update scores";
  }
}

document.getElementById("refresh").onclick = update;

// Gazette toggle: hidden by default, reveals on tap. Keeps mobile uncluttered.
document.getElementById("gazetteToggle").onclick = function () {
  const g = document.getElementById("gazette");
  const showing = g.style.display !== "none";
  g.style.display = showing ? "none" : "block";
  this.textContent = showing ? "📰 Today's Top Stories" : "📰 Hide Top Stories";
};
// initial paint: everyone on zero
render(buildLeaderboard(Object.fromEntries(ALL_TEAMS.map(t => [t, { matches: [], stageReached: null }]))));
showMessages(`<div class="msg hint">Tap <b>Update scores</b> to pull the latest results.
  Until the tournament kicks off, everyone sits on 0.</div>`);
update();
</script>
</body>
</html>
