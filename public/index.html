  .gz-headline { font-family: 'Georgia','Times New Roman',serif; font-size: 15px; line-height: 1.4; padding: 7px 0; border-bottom: 1px solid rgba(0,0,0,.12); }
  .gz-headline:last-child { border-bottom: none; }

  .rowhead { width: 100%; display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: none; border: none; color: var(--cream); cursor: pointer; text-align: left; flex: unset; border-radius: 0; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

<body>
<div class="frame">
  <header>
    <div class="eyebrow">FIFA World Cup 2026 · World Cup Sweepstake</div>
    <h1>The Standings</h1>
    <div class="sub">€440 pot · 22 entries · 1st €250 / 2nd €120 / 3rd €50</div>
  </header>

  <div class="controls">
    <button id="refresh">Update scores</button>
  </div>
  <div class="controls">
    <button id="gazetteToggle" class="secondary">📰 THE FINAL PREVIEW</button>
  </div>

  <div id="gazette" style="display:none;"></div>

  <div id="messages"></div>
  <div id="updated" class="updated"></div>
  <ol id="board"></ol>

  <footer>
    Win 3 · Draw 1 · Goal 1 · KO bonuses cumulative (3/5/10/15/20/30) · shootout = draw
  </footer>
</div>

<script>
// ── COMPETITION DATA ────────────────────────────────────────
const ENTRIES = [
  { n:1, name:"Amy", teams:["Argentina","Switzerland","Scotland","Saudi Arabia"] },
  { n:2, name:"Caroline", teams:["Belgium","Croatia","Ghana","New Zealand"] },
  { n:3, name:"Conor", teams:["Brazil","Senegal","Australia","Panama"] },
  { n:4, name:"Dave Mac", teams:["Spain","Uruguay","Scotland","Jordan"] },
  { n:5, name:"Davy", teams:["Germany","Turkey","Egypt","Haiti"] },
  { n:6, name:"Eoghan", teams:["Spain","USA","Czechia","South Africa"] },
  { n:7, name:"Greg", teams:["Argentina","Sweden","Bosnia","South Africa"] },
  { n:8, name:"Helen", teams:["Spain","Mexico","Tunisia","Uzbekistan"] },
  { n:9, name:"Isabel", teams:["Brazil","Croatia","Ghana","South Africa"] },
  { n:10, name:"Jack", teams:["France","Japan","Bosnia","New Zealand"] },
  { n:11, name:"Juliette", teams:["Brazil","Japan","Scotland","South Africa"] },
  { n:12, name:"Leanne", teams:["Portugal","Sweden","Bosnia","Qatar"] },
  { n:13, name:"Louie", teams:["Spain","Japan","South Korea","Uzbekistan"] },
  { n:14, name:"Maurice", teams:["Belgium","USA","Egypt","South Africa"] },
  { n:15, name:"Mike", teams:["France","Mexico","Scotland","Iran"] },
  { n:16, name:"Osian", teams:["Netherlands","USA","Scotland","South Africa"] },
  { n:17, name:"Paul", teams:["Spain","Uruguay","Paraguay","Uzbekistan"] },
  { n:18, name:"Richie", teams:["Spain","USA","Ivory Coast","Uzbekistan"] },
  { n:19, name:"Rob", teams:["Brazil","Uruguay","South Korea","DR Congo"] },
  { n:20, name:"Rory", teams:["France","USA","Ghana","New Zealand"] },
  { n:21, name:"Zeyneb", teams:["France","USA","Scotland","DR Congo"] },
  { n:22, name:"Katie", teams:["France","Croatia","Australia","DR Congo"] },
];

const FLAGS = {
  France:"🇫🇷",Switzerland:"🇨🇭",Scotland:"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Saudi Arabia":"🇸🇦",Belgium:"🇧🇪",
  Croatia:"🇭🇷",Ghana:"🇬🇭","New Zealand":"🇳🇿",Brazil:"🇧🇷",Senegal:"🇸🇳",Australia:"🇦🇺",
  Panama:"🇵🇦",Spain:"🇪🇸",Uruguay:"🇺🇾",Jordan:"🇯🇴",Germany:"🇩🇪",Turkey:"🇹🇷",Egypt:"🇪🇬",
  Haiti:"🇭🇹",USA:"🇺🇸",Czechia:"🇨🇿","South Africa":"🇿🇦",Argentina:"🇦🇷",Sweden:"🇸🇪",
  Bosnia:"🇧🇦",Mexico:"🇲🇽",Tunisia:"🇹🇳",Uzbekistan:"🇺🇿",Japan:"🇯🇵",Portugal:"🇵🇹",
  Qatar:"🇶🇦","South Korea":"🇰🇷",Netherlands:"🇳🇱",Paraguay:"🇵🇾","Ivory Coast":"🇨🇮",
  Iran:"🇮🇷","DR Congo":"🇨🇩",
};

// Aliases: display name -> possible football-data.org strings.
// Verified risk cases (FIFA uses "Korea Republic" not "South Korea", etc).
// The diagnostic panel will surface anything still unmatched against live data.
const ALIASES = {
  USA: ["United States","USA"],
  "South Korea": ["South Korea","Korea Republic","Republic of Korea"],
  Czechia: ["Czechia","Czech Republic"],
  "Ivory Coast": ["Ivory Coast","Côte d'Ivoire","Cote d'Ivoire"],
  "DR Congo": ["DR Congo","Congo DR","Democratic Republic of the Congo","DR Congo"],
  Turkey: ["Turkey","Türkiye","Turkiye"],
  Bosnia: ["Bosnia","Bosnia and Herzegovina","Bosnia-Herzegovina"],
};

// ── SCORING ─────────────────────────────────────────────────
// 2026 format note: the group winners/runners-up + best thirds advance to a
// new ROUND OF 32. So "qualify from group" now means reaching the R32 — that's
// where the 3-pt qualification bonus lands. Winning the R32 tie to reach the
// actual Round of 16 banks the 5, and so on up. Bonuses are cumulative.
const BONUS = { r32:3, last16:5, qf:10, sf:15, final:20, winner:30 };
const STAGE_ORDER = ["group","r32","last16","qf","sf","final","winner"];
// football-data.org v4 stage strings -> our keys
const STAGE_MAP = {
  GROUP_STAGE:"group", LAST_32:"r32", ROUND_OF_32:"r32",
  ROUND_OF_16:"last16", LAST_16:"last16", QUARTER_FINALS:"qf",
  SEMI_FINALS:"sf", FINAL:"final",
};

function computeTeam(matches, stageReached) {
  let pts = 0, result = 0, goals = 0, bonus = 0, gd = 0;
  for (const m of matches) {
    goals += m.goalsFor;
    gd += m.goalsFor - m.goalsAgainst;
    if (m.knockout && m.decidedByPens) { pts += 1; result += 1; }
    else if (m.goalsFor > m.goalsAgainst) { pts += 3; result += 3; }
    else if (m.goalsFor === m.goalsAgainst) { pts += 1; result += 1; }
    pts += m.goalsFor;
  }
  // Cumulative stage bonuses. A team sitting at "group" has only PLAYED group
  // games, not qualified — so it earns NO bonus yet. The qualification bonus
  // (3) lands at "r32" (reaching the Round of 32 = qualifying from the group).
  // Because bonuses are cumulative, "group" simply has no bonus entry.
  if (stageReached && stageReached !== "group") {
    const idx = STAGE_ORDER.indexOf(stageReached);
    for (let i = 0; i <= idx; i++) {
      if (BONUS[STAGE_ORDER[i]]) { pts += BONUS[STAGE_ORDER[i]]; bonus += BONUS[STAGE_ORDER[i]]; }
    }
  }
  return { pts, result, goals, bonus, gd };
}

const ALL_TEAMS = [...new Set(ENTRIES.flatMap(e => e.teams))];

function resolveName(apiName) {
  if (!apiName) return null;
  for (const dn of ALL_TEAMS) {
    if (dn === apiName) return dn;
    const al = ALIASES[dn] || [dn];
    if (al.some(a => a.toLowerCase() === apiName.toLowerCase())) return dn;
  }
  return null;
}

function processMatches(apiMatches) {
  const data = {};
  for (const t of ALL_TEAMS) data[t] = { matches: [], stageReached: null };
  const unmatched = new Set();

  for (const m of apiMatches) {
    if (!["FINISHED","IN_PLAY","PAUSED"].includes(m.status)) continue;
    const stageKey = STAGE_MAP[m.stage];
    const ft = m.score?.fullTime || {};
    const hg = ft.home ?? 0, ag = ft.away ?? 0;
    const knockout = m.stage !== "GROUP_STAGE";
    const pens = knockout && m.score?.duration === "PENALTY_SHOOTOUT";

    for (const side of ["home","away"]) {
      const raw = side === "home" ? m.homeTeam?.name : m.awayTeam?.name;
      const dn = resolveName(raw);
      if (!dn) { if (raw) unmatched.add(raw); continue; }
      const gf = side === "home" ? hg : ag;
      const ga = side === "home" ? ag : hg;
      data[dn].matches.push({ goalsFor: gf, goalsAgainst: ga, knockout, decidedByPens: pens });
      if (stageKey) {
        const cur = data[dn].stageReached;
        if (cur === null || STAGE_ORDER.indexOf(stageKey) > STAGE_ORDER.indexOf(cur))
          data[dn].stageReached = stageKey;
      }
    }
  }
  return { data, unmatched: [...unmatched] };
}

function buildLeaderboard(teamData) {
  const rows = ENTRIES.map(e => {
    let total = 0, gd = 0;
    const breakdown = e.teams.map(t => {
      const td = teamData[t];
      if (!td || td.stageReached === null)
        return { team: t, pts: 0, result: 0, goals: 0, bonus: 0, gd: 0 };
      const c = computeTeam(td.matches, td.stageReached);
      total += c.pts; gd += c.gd;
      return { team: t, ...c };
    });
    return { ...e, total, gd, breakdown };
  });
  // Sort: total points, then goal difference, then entry order.
  rows.sort((a,b) => b.total - a.total || b.gd - a.gd || a.n - b.n);
  let rank = 0, prev = null, prevGd = null;
  rows.forEach((r,i) => {
    if (r.total !== prev || r.gd !== prevGd) { rank = i+1; prev = r.total; prevGd = r.gd; }
    r.rank = rank;
  });
  return rows;
}

// ── RENDER ──────────────────────────────────────────────────
let expanded = null;

function render(rows) {
  const board = document.getElementById("board");
  board.innerHTML = "";
  for (const r of rows) {
    const podium = r.rank <= 3 && r.total > 0;
    const li = document.createElement("li");
    if (podium) li.className = "podium";

    const head = document.createElement("button");
    head.className = "rowhead";
    head.onclick = () => { expanded = expanded === r.n ? null : r.n; render(rows); };
    head.innerHTML = `
      <span class="rank ${podium ? "top" : ""}">${r.total > 0 ? r.rank : "–"}</span>
      <span class="name">${r.name}</span>
      <span class="flags">${r.teams.map(t => `<span title="${t}">${FLAGS[t]||"🏳"}</span>`).join(" ")}</span>
      <span class="total">${r.total}</span>
      <span class="gd" title="goal difference (tiebreak)">${r.gd >= 0 ? "+" : ""}${r.gd}</span>
      <span class="chev">${expanded === r.n ? "▾" : "▸"}</span>`;
    li.appendChild(head);

    if (expanded === r.n) {
      const bd = document.createElement("div");
      bd.className = "breakdown";
      bd.innerHTML = r.breakdown.map(b => `
        <div class="brow">
          <span>${FLAGS[b.team]}</span>
          <span class="bteam">${b.team}</span>
          <span class="bdetail">${b.result}r + ${b.goals}g + ${b.bonus}b</span>
          <span class="bpts">${b.pts}</span>
        </div>`).join("");
      li.appendChild(bd);
    }
    board.appendChild(li);
  }
}

function showMessages(html) { document.getElementById("messages").innerHTML = html; }

// ── THE SWEEPSTAKE GAZETTE ──────────────────────────────────
// Generates cheeky newspaper headlines from the live standings.
// Movement is measured against a per-device snapshot in localStorage
// (so "since your last visit", not a global midnight reset).
function renderGazette(rows) {
  const el = document.getElementById("gazette");

  // ── FINAL EDITION ──────────────────────────────────────────
  // Set to true for the World Cup final: shows the hand-written preview
  // instead of the random headlines. Set back to false to restore the
  // automatic Gazette afterwards.
  const FINAL_EDITION = true;
  if (FINAL_EDITION) {
    const today = new Date().toLocaleDateString(undefined, { weekday:"long", day:"numeric", month:"long" });
    const paras = [
      `<b>It all comes down to this.</b> After a month of glory, heartbreak and interminable WhatsApp notifications (some of you hit the mute button hard on day 1), we arrive at Spain v Argentina.`,
      `<b>Greg, we owe you an apology.</b> Widely mocked behind the scenes for backing Argentina, he now looks less a fool and more a visionary. Messi, zimmerframe and all, has been unstoppable... so far. One more game to bring home all the spoils, or to share them with Amy after her highly controversial last-minute team switch. Corruption you say? We are told it passed all the transparency checks you'd expect of a FIFA-adjudicated process.`,
      `<b>Spain, meanwhile, are here on merit and boredom.</b> A team so painful to watch they make drying paint feel like a penalty shootout. Half the sweepstake is pinning their hopes on them, so if they win everyone takes home about €14.`,
      `<b>Alas, poor France.</b> Many of you thought it was a done deal. Zeyneb had already spent the winnings. Mike, at least, took it like a gentleman. For les Bleus, in the end, it was a case of too many croissants.`,
      `<b>Honourable mentions:</b> Conor failed to diagnose that his teams were terminal. Davy delivered his finest performance in the WhatsApp group rather than on the pitch. And Jack, fair play for not picking the USA.`,
      `<b>And at the very bottom, Rob.</b> Dead last, suffering the ignominy of being behind Dave who has never watched a game of football in his life. The architect of this very app, hoisted by his own leaderboard. We're told a consolation prize awaits, but it may just be a wooden spoon.`,
      `<b>Finally, genuine thanks</b> to Davy and everyone whose commentary in the WhatsApp group made the games worth watching. Enjoy the final. Come on Argentina!`,
    ];
    el.innerHTML = `
      <div class="gz-masthead">
        <div class="gz-title">The Conwon Gazette</div>
        <div class="gz-sub">Final Edition · Spain v Argentina · ${today}</div>
      </div>
      ${paras.map(p => `<div class="gz-headline">${p}</div>`).join("")}`;
    return;
  }

  // ── AUTOMATIC GAZETTE (used outside the final) ──────────────
  // Only run once there are actual points on the board.
  const anyPoints = rows.some(r => r.total > 0);

  // Load previous snapshot (per device) and compute movement.
  let prev = {};
  try { prev = JSON.parse(localStorage.getItem("wc_prev_ranks") || "{}"); } catch (e) {}
  const movement = {}; // name -> places gained (positive = climbed)
  rows.forEach(r => {
    if (prev[r.name] != null) movement[r.name] = prev[r.name] - r.rank;
  });
  // Save current snapshot for next time.
  const snap = {};
  rows.forEach(r => { snap[r.name] = r.rank; });
  try { localStorage.setItem("wc_prev_ranks", JSON.stringify(snap)); } catch (e) {}

  const leader = rows[0];
  const bottom = rows[rows.length - 1];
  const sortedByMove = Object.entries(movement).sort((a,b) => b[1] - a[1]);
  const biggestClimber = sortedByMove.find(([, m]) => m > 0);
  const biggestFaller = sortedByMove.reverse().find(([, m]) => m < 0);
  const heldTop = movement[leader.name] === 0 || prev[leader.name] === 1;

  // pick a random team from a person for colour
  const aTeam = (r) => r.teams[Math.floor(Math.random() * r.teams.length)];
  const mid = rows[Math.floor(rows.length / 2)];
  const rnd = rows[Math.floor(Math.random() * rows.length)];
  const rnd2 = rows[Math.floor(Math.random() * rows.length)];

  // Headline bank. Each entry tags WHO it's about, so we can guarantee
  // three different people are featured (no picking the same person twice).
  const POOL = [];
  const add = (who, text) => POOL.push({ who, text });
  // ── Leader headlines ──
  add(leader.name, `<b>${leader.name}</b> sits top of the pile on ${leader.total}. What a champ.`);
  add(leader.name, `Bow down: <b>${leader.name}</b> leads the Gazette table. Insufferable about it, no doubt.`);
  add(leader.name, `<b>${leader.name}</b> tops the standings on ${leader.total}. The rest of you, do better.`);
  add(leader.name, `Sources confirm <b>${leader.name}</b> has already drafted a victory speech. Premature? Probably.`);
  add(leader.name, `<b>${leader.name}</b> leads the way, powered by ${aTeam(leader)}. Nobody saw it coming. Nobody.`);
  add(leader.name, `Gold standard: <b>${leader.name}</b> out in front and showing no mercy.`);
  if (heldTop) add(leader.name, `<b>${leader.name}</b> clings to top spot. The dynasty continues.`);
  if (heldTop) add(leader.name, `Still no.1: <b>${leader.name}</b> refuses to relinquish the throne. Boring, frankly.`);
  // ── Second place ──
  if (rows[1]) add(rows[1].name, `<b>${rows[1].name}</b> lurks in second, sharpening the knives. ${leader.name} should sleep lightly.`);
  if (rows[1]) add(rows[1].name, `So near yet so far: <b>${rows[1].name}</b> stuck in the bridesmaid spot on ${rows[1].total}.`);
  // ── Bottom headlines (savage) ──
  add(bottom.name, `Rock bottom for <b>${bottom.name}</b> on ${bottom.total}. Grim scenes. Thoughts and prayers.`);
  add(bottom.name, `<b>${bottom.name}</b> props up the table. Somebody has to, but did it have to be like this?`);
  add(bottom.name, `<b>${bottom.name}</b>'s ${aTeam(bottom)} doing absolutely nothing to ease the pain.`);
  add(bottom.name, `Wooden spoon watch: <b>${bottom.name}</b> dead last and sinking. Has anyone checked they're okay?`);
  add(bottom.name, `<b>${bottom.name}</b> on ${bottom.total} points. The Gazette has run out of polite things to say.`);
  add(bottom.name, `Bottom of the barrel: <b>${bottom.name}</b>. The €420 dream is, mathematically, a nightmare.`);
  add(bottom.name, `<b>${bottom.name}</b> reportedly "still confident." We admire the delusion.`);
  // ── Movement headlines ──
  if (biggestClimber) add(biggestClimber[0], `SURGE: <b>${biggestClimber[0]}</b> rockets ${biggestClimber[1]} place${biggestClimber[1]>1?"s":""} up the table since your last visit. Bandwagon forming.`);
  if (biggestClimber) add(biggestClimber[0], `On the up: <b>${biggestClimber[0]}</b> climbs ${biggestClimber[1]} spot${biggestClimber[1]>1?"s":""}. Form is temporary, smugness is forever.`);
  if (biggestFaller) add(biggestFaller[0], `FREEFALL: <b>${biggestFaller[0]}</b> tumbles ${Math.abs(biggestFaller[1])} place${Math.abs(biggestFaller[1])>1?"s":""}. The wheels have come off.`);
  if (biggestFaller) add(biggestFaller[0], `Ouch: <b>${biggestFaller[0]}</b> slides ${Math.abs(biggestFaller[1])} place${Math.abs(biggestFaller[1])>1?"s":""} down the table. It's not panic yet, but it's close.`);
  // ── Mid-table filler (warm) ──
  add(mid.name, `<b>${mid.name}</b> sits mid-table on ${mid.total} — neither hero nor villain. A people's champion.`);
  add(mid.name, `Quietly fancied: <b>${mid.name}</b>'s ${aTeam(mid)} could yet change everything. Or nothing.`);
  add(mid.name, `<b>${mid.name}</b> hovering in the pack, biding their time. Allegedly part of a "master plan."`);
  add(mid.name, `Mid-table mediocrity has a name, and this week it's <b>${mid.name}</b>. No offence.`);
  // ── Random punter team callouts ──
  add(rnd.name, `<b>${rnd.name}</b> pinning hopes on ${aTeam(rnd)}. Bold. Possibly foolish.`);
  add(rnd.name, `<b>${rnd.name}</b> still waiting on ${aTeam(rnd)} to turn up. Any day now.`);
  add(rnd.name, `Insiders say <b>${rnd.name}</b> "always backed ${aTeam(rnd)}." Revisionism at its finest.`);
  add(rnd.name, `<b>${rnd.name}</b> living and dying with every ${aTeam(rnd)} kick. A cautionary tale.`);
  add(rnd2.name, `Breaking: <b>${rnd2.name}</b> has opinions about the table. The Gazette did not ask for them.`);

  // ── SASSY batch ──
  add(leader.name, `<b>${leader.name}</b> at the top and absolutely loving the smell of their own success. Open a window.`);
  add(leader.name, `Memo to <b>${leader.name}</b>: leading in week one is the football equivalent of peaking at your debs.`);
  add(bottom.name, `<b>${bottom.name}</b> has entered the chat. The chat has gone very quiet.`);
  add(bottom.name, `We rang <b>${bottom.name}</b> for comment. They asked us to stop rubbing it in. We will not.`);
  add(bottom.name, `<b>${bottom.name}</b>: proof that hope is a renewable resource and points are not.`);
  add(bottom.name, `Scientists baffled: <b>${bottom.name}</b>'s ${aTeam(bottom)} found a new way to disappoint.`);
  add(mid.name, `<b>${mid.name}</b> doing the bare minimum and calling it a strategy. Iconic, honestly.`);
  add(mid.name, `<b>${mid.name}</b> is the group chat member who reacts but never replies. Mid-table behaviour.`);
  add(rnd.name, `<b>${rnd.name}</b> talking a big game for someone whose ${aTeam(rnd)} can't pass a parked car.`);
  add(rnd.name, `<b>${rnd.name}</b> said this was "their year." The Gazette has noted it for the records.`);
  add(rnd.name, `Bold of <b>${rnd.name}</b> to celebrate. Bold, and frankly, a little embarrassing.`);
  add(rnd2.name, `<b>${rnd2.name}</b> still here. Still trying. We respect the commitment if not the results.`);
  if (rows[1]) add(rows[1].name, `<b>${rows[1].name}</b> doing all the work and getting none of the glory. A second-place state of mind.`);
  if (biggestFaller) add(biggestFaller[0], `<b>${biggestFaller[0]}</b> sliding down the table with the grace of a shopping trolley.`);
  if (biggestClimber) add(biggestClimber[0], `<b>${biggestClimber[0]}</b> climbing the table and won't shut up about it. Touch grass.`);

  // ── SURREAL batch ──
  add(leader.name, `<b>${leader.name}</b> tops the table. Somewhere, a crow nods slowly and understands.`);
  add(leader.name, `The number one spot belongs to <b>${leader.name}</b>. The number one spot has always belonged to <b>${leader.name}</b>. Do not question the number one spot.`);
  add(bottom.name, `<b>${bottom.name}</b> sits at the bottom, where the soup is cold and the clocks run backwards.`);
  add(bottom.name, `Last place is not a position. Last place is a feeling. <b>${bottom.name}</b> knows this now.`);
  add(bottom.name, `<b>${bottom.name}</b>'s ${aTeam(bottom)} reportedly seen wandering a car park at dawn, asking passers-by for points.`);
  add(mid.name, `<b>${mid.name}</b> floats in the mid-table fog, neither here nor there, much like a Tuesday.`);
  add(mid.name, `A goose has been spotted near <b>${mid.name}</b>'s name on the table. The goose offers no comment. The goose never does.`);
  add(rnd.name, `<b>${rnd.name}</b> dreamt of ${aTeam(rnd)} lifting the trophy. In the dream the trophy was a pineapple. Make of that what you will.`);
  add(rnd.name, `<b>${rnd.name}</b> and ${aTeam(rnd)}: a love story written in disappearing ink.`);
  add(rnd.name, `The Gazette consulted the stars about <b>${rnd.name}</b>. The stars said "maybe." The stars are cowards.`);
  add(rnd2.name, `<b>${rnd2.name}</b> exists in the table, therefore <b>${rnd2.name}</b> exists. Descartes would be furious.`);
  add(rnd2.name, `Time is a flat circle and so is the football. <b>${rnd2.name}</b> understands neither.`);
  if (biggestClimber) add(biggestClimber[0], `<b>${biggestClimber[0]}</b> rose through the table like steam off a forgotten cup of tea. Beautiful. Brief. Slightly damp.`);
  if (biggestFaller) add(biggestFaller[0], `<b>${biggestFaller[0]}</b> fell down the table and kept falling, past the basement, into a quiet place where no points are kept.`);
  add(leader.name, `BREAKING: the table has achieved sentience and it, too, fears <b>${leader.name}</b>.`);

  // Pick 3 headlines about 3 DIFFERENT people.
  const chosen = [];
  const usedPeople = new Set();
  const bag = [...POOL];
  while (chosen.length < 3 && bag.length) {
    const pick = bag.splice(Math.floor(Math.random() * bag.length), 1)[0];
    if (usedPeople.has(pick.who)) continue; // skip if this person already featured
    usedPeople.add(pick.who);
    chosen.push(pick.text);
  }
  // Fallback: if too few distinct people exist (very early days), top up
  // with whatever's left so we still show something.
  if (chosen.length < 3) {
    const leftovers = POOL.filter(p => !chosen.includes(p.text));
    while (chosen.length < 3 && leftovers.length) {
      chosen.push(leftovers.splice(Math.floor(Math.random() * leftovers.length), 1)[0].text);
    }
  }

  const today = new Date().toLocaleDateString(undefined, { weekday:"long", day:"numeric", month:"long" });

  if (!anyPoints) {
    el.innerHTML = `
      <div class="gz-masthead">
        <div class="gz-title">The Conwon Gazette</div>
        <div class="gz-sub">Late Edition · ${today}</div>
      </div>
      <div class="gz-headline gz-lede">Tournament yet to kick off. Reporters standing by, pens sharpened, knives sharper. Check back once the goals start flowing.</div>`;
    return;
  }

  el.innerHTML = `
    <div class="gz-masthead">
      <div class="gz-title">The Conwon Gazette</div>
      <div class="gz-sub">Late Edition · ${today}</div>
    </div>
    ${chosen.map(h => `<div class="gz-headline">${h}</div>`).join("")}`;
}

async function update() {
  const btn = document.getElementById("refresh");
  btn.disabled = true; btn.textContent = "Updating…";
  showMessages("");
  try {
    const res = await fetch("/api/scores");
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `Request failed (${res.status})`);

    const { data, unmatched } = processMatches(json.matches || []);
    const rows = buildLeaderboard(data);
    render(rows);
    renderGazette(rows);

    document.getElementById("updated").textContent =
      "Updated " + new Date().toLocaleTimeString() + " · " + new Date().toLocaleDateString();

    if (unmatched.length) {
      // Silent name-check: logged to the browser console for Rob's setup
      // verification, but not shown to the group. To view, open the page,
      // right-click -> Inspect -> Console.
      console.log("[Name check] Unmatched API team names (scored nothing):", unmatched.join(", "));
    }
  } catch (e) {
    showMessages(`<div class="msg error">${e.message}</div>`);
  } finally {
    btn.disabled = false; btn.textContent = "Update scores";
  }
}

document.getElementById("refresh").onclick = update;

// Gazette toggle: hidden by default, reveals on tap. Keeps mobile uncluttered.
document.getElementById("gazetteToggle").onclick = function () {
  const g = document.getElementById("gazette");
  const showing = g.style.display !== "none";
  g.style.display = showing ? "none" : "block";
  this.textContent = showing ? "📰 THE FINAL PREVIEW" : "📰 HIDE PREVIEW";
};
// initial paint: everyone on zero
render(buildLeaderboard(Object.fromEntries(ALL_TEAMS.map(t => [t, { matches: [], stageReached: null }]))));
showMessages(`<div class="msg hint">Tap <b>Update scores</b> to pull the latest results.
  Until the tournament kicks off, everyone sits on 0.</div>`);
update();
</script>
